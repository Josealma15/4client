[phases.setup]
nixPkgs = ["nodejs_20", "python3"]

[phases.install]
cmds = ["corepack enable && corepack prepare pnpm@10 --activate && pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter api exec prisma generate",
  "pnpm --filter api build"
]

[start]
cmd = "node apps/api/dist/server.js"
